<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Bangor River Level</title>
  <meta name="theme-color" content="#0a1628">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Chart.js + date adapter -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

  <!-- JSZip for unzipping the CSV in the browser -->

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

  <!-- PapaParse for robust CSV parsing -->

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
  <span class="header-icon">〜</span>
  <span>Bangor River</span>
  <button class="refresh-btn" id="refreshBtn" title="Refresh">↻</button>
</header>

<main class="container">

  <!-- CURRENT LEVEL CARD -->

  <section class="card gauge-card">
    <div class="tide-bar">
      <div class="tide-fill" id="tideFill"></div>
    </div>
    <div class="gauge-body">
      <div class="level-display">
        <span class="level-number" id="currentGauge">--.-</span>
        <span class="level-unit">m gauge</span>
      </div>
      <div class="epa-level" id="epaLevelDisplay">EPA: --.--- m (TBM)</div>

```
  <div class="trend-row" id="trendRow">
    <span class="trend-icon" id="trendIcon">—</span>
    <span class="trend-label" id="trendLabel">Loading…</span>
    <span class="trend-rate" id="trendRate"></span>
  </div>

  <div class="updated-row">
    Reading: <span id="readingTime">--:--</span>
    &nbsp;·&nbsp;
    <span id="dataAge" class="age-ok">--</span>
  </div>
</div>
```

  </section>

  <!-- FORECAST CARD -->

  <section class="card forecast-card">
    <div class="forecast-header">Forecast</div>
    <div class="forecast-grid">
      <div class="fc-col">
        <div class="fc-time">+1 hr</div>
        <div class="fc-gauge" id="f1Gauge">--.-</div>
        <div class="fc-epa"  id="f1EPA">--.---</div>
      </div>
      <div class="fc-divider"></div>
      <div class="fc-col">
        <div class="fc-time">+3 hr</div>
        <div class="fc-gauge" id="f3Gauge">--.-</div>
        <div class="fc-epa"  id="f3EPA">--.---</div>
      </div>
      <div class="fc-divider"></div>
      <div class="fc-col">
        <div class="fc-time">+6 hr</div>
        <div class="fc-gauge" id="f6Gauge">--.-</div>
        <div class="fc-epa"  id="f6EPA">--.---</div>
      </div>
    </div>
    <div class="forecast-note" id="forecastNote">Based on current trend</div>
  </section>

  <!-- PERIOD SELECTOR -->

  <section class="card period-card">
    <div class="period-label">History</div>
    <div class="period-buttons">
      <button class="period-btn active" data-h="6">6h</button>
      <button class="period-btn" data-h="12">12h</button>
      <button class="period-btn" data-h="24">24h</button>
      <button class="period-btn" data-h="48">48h</button>
      <button class="period-btn" data-h="72">3d</button>
    </div>
  </section>

  <!-- CHART CARD -->

  <section class="card chart-card">
    <div class="chart-wrap">
      <canvas id="levelChart"></canvas>
    </div>
    <div class="chart-legend">
      <span class="legend-line hist"></span> Gauge level (m)
      &nbsp;&nbsp;
      <span class="legend-line fore"></span> Forecast
      &nbsp;&nbsp;
      <span class="legend-now"></span> Now
    </div>
  </section>

  <!-- STATUS / ERROR -->

  <div class="status-bar" id="statusBar"></div>

  <!-- EPA SOURCE IMAGE -->

  <section class="card epa-card">
    <div class="epa-label">EPA Source — 3 Month Overview</div>
    <img id="epaImage" src="" alt="EPA river level chart" loading="lazy">
    <div class="epa-meta" id="epaMeta"></div>
  </section>

</main>

<script type="module" src="js/app.js"></script>

</body>
</html>
