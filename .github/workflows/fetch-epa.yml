name: Fetch EPA River Data

on:
  schedule:
    # Runs at :02, :17, :32, :47 past each hour — just after EPA's 15-min updates
    - cron: '2,17,32,47 * * * *'
  workflow_dispatch:  # allows manual trigger from Actions tab

permissions:
  contents: write  # needed to commit data.json back to repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch EPA data and generate data.json
        run: |
          python3 << 'PYEOF'
          import urllib.request, zipfile, io, json, re, sys
          from datetime import datetime, timezone

          ZIP_URL = "https://epawebapp.epa.ie/Hydronet/output/internet/stations/CAS/33008/S/3_months.zip"
          PNG_URL = "https://epawebapp.epa.ie/hydronet/output/internet/stations/CAS/33008/S/extralarge_3m_extralarge.png"
          GAUGE_A = 14.664
          GAUGE_B = -1452

          def to_gauge(epa):
              return GAUGE_A * epa + GAUGE_B

          def parse_ts(s):
              s = s.strip()
              for fmt in ('%Y-%m-%dT%H:%M', '%Y-%m-%d %H:%M', '%d.%m.%Y %H:%M', '%d.%m.%y %H:%M', '%d/%m/%Y %H:%M'):
                  try:
                      return datetime.strptime(s[:len(fmt.replace('%Y','2026').replace('%m','01').replace('%d','01').replace('%H','00').replace('%M','00'))], fmt)
                  except:
                      pass
              m = re.match(r'^(\d{2})[./](\d{2})[./](\d{2,4})\s+(\d{2}):(\d{2})', s)
              if m:
                  yr = int(m[3]) + (2000 if len(m[3])==2 else 0)
                  return datetime(yr, int(m[2]), int(m[1]), int(m[4]), int(m[5]))
              return None

          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/125.0.0.0 Safari/537.36',
              'Accept': '*/*',
              'Referer': 'https://epawebapp.epa.ie/',
          }

          # --- Fetch ZIP ---
          rows = []
          try:
              req = urllib.request.Request(ZIP_URL, headers=headers)
              resp = urllib.request.urlopen(req, timeout=30)
              data = resp.read()
              print(f"ZIP: {len(data)} bytes")
              z = zipfile.ZipFile(io.BytesIO(data))
              csv_name = next((n for n in z.namelist() if re.search(r'\.(csv|txt|dat)$', n, re.I)), None)
              if csv_name:
                  text = z.read(csv_name).decode('latin-1')
                  lines = text.splitlines()
                  header_done = False
                  delim = None
                  for line in lines:
                      t = line.strip()
                      if not t: continue
                      if not header_done:
                          if re.match(r'^[#/*"]', t) or re.match(r'^(date|time|timestamp)', t, re.I): continue
                          if re.match(r'^\d', t):
                              header_done = True
                              delim = ';' if ';' in t else '\t' if '\t' in t else ','
                          else: continue
                      parts = [p.strip().strip('"') for p in t.split(delim)]
                      if len(parts) < 2: continue
                      ts = parse_ts(parts[0])
                      try: val = float(parts[1].replace(',','.'))
                      except: continue
                      if not ts or not (95 <= val <= 110): continue
                      if len(parts) > 2 and parts[2].lower() in ('bad','10','20','missing'): continue
                      rows.append({'ts': ts.isoformat(), 'epa': round(val,4), 'gauge': round(to_gauge(val),4)})
                  print(f"CSV rows: {len(rows)}")
          except Exception as e:
              print(f"ZIP failed: {e}", file=sys.stderr)

          # --- Fetch PNG footer ---
          png_anchor = None
          try:
              req = urllib.request.Request(PNG_URL, headers=headers)
              resp = urllib.request.urlopen(req, timeout=20)
              png_data = resp.read()
              text = png_data.decode('latin-1')
              m = re.search(r'Last\s+value\s+at\s+(\d{2})\.(\d{2})\.(\d{2,4})\s+(\d{2}):(\d{2})\s+([\d.]+)\s*m', text, re.I)
              if m:
                  yr = int(m[3]) + (2000 if len(m[3])==2 else 0)
                  ts = datetime(yr, int(m[2]), int(m[1]), int(m[4]), int(m[5]))
                  epa = float(m[6])
                  if 95 <= epa <= 110:
                      png_anchor = {'ts': ts.isoformat(), 'epa': round(epa,4), 'gauge': round(to_gauge(epa),4)}
                      print(f"PNG anchor: {epa} m at {ts}")
          except Exception as e:
              print(f"PNG failed: {e}", file=sys.stderr)

          # --- Merge and write ---
          if not rows and not png_anchor:
              print("ERROR: No data fetched", file=sys.stderr)
              sys.exit(1)

          # Append PNG anchor if newer than last CSV row
          if png_anchor and rows:
              from datetime import datetime
              last_ts = datetime.fromisoformat(rows[-1]['ts'])
              png_ts  = datetime.fromisoformat(png_anchor['ts'])
              if png_ts > last_ts:
                  rows.append({**png_anchor, 'synthetic': True})
                  print(f"PNG appended as anchor")
          elif png_anchor and not rows:
              rows = [{**png_anchor, 'synthetic': True}]

          output = {
              'generated': datetime.now(timezone.utc).isoformat(),
              'rows': rows,
              'png_anchor': png_anchor,
              'count': len(rows),
          }

          with open('data.json', 'w') as f:
              json.dump(output, f, separators=(',',':'))

          print(f"data.json written: {len(rows)} rows")
          PYEOF

      - name: Commit data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if data.json changed
          if git diff --staged --quiet; then
            echo "No changes to data.json"
          else
            git commit -m "data: EPA fetch $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
